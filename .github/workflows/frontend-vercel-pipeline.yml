name: Frontend Vercel Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-sync-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync Vercel env vars from template
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          VERCEL_STRAPI_URL: ${{ vars.VERCEL_STRAPI_URL }}
        run: node scripts/sync-vercel-env.mjs

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_TEAM_ID" ]; then
            export VERCEL_ORG_ID="$VERCEL_TEAM_ID"
          fi
          npx vercel deploy --prod --yes --token="$VERCEL_TOKEN"
