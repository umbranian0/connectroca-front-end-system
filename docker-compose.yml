services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: connecttroca-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_BACKEND_TARGET: ${VITE_BACKEND_TARGET:-local}
      VITE_STRAPI_URL: ${VITE_STRAPI_URL:-}
      VITE_STRAPI_URL_LOCAL: ${VITE_STRAPI_URL_LOCAL:-http://localhost:1337}
      VITE_STRAPI_URL_DEVELOPMENT: ${VITE_STRAPI_URL_DEVELOPMENT:-https://connectra-backend-system-f4a977a741b9.herokuapp.com}
      VITE_STRAPI_URL_DEVELOP: ${VITE_STRAPI_URL_DEVELOP:-https://connectra-backend-system-f4a977a741b9.herokuapp.com}
      VITE_STRAPI_AUTH_ENDPOINT: ${VITE_STRAPI_AUTH_ENDPOINT:-/api/auth/local}
      VITE_STRAPI_REGISTER_ENDPOINT: ${VITE_STRAPI_REGISTER_ENDPOINT:-/api/auth/local/register}
      VITE_STRAPI_FORGOT_PASSWORD_ENDPOINT: ${VITE_STRAPI_FORGOT_PASSWORD_ENDPOINT:-/api/auth/forgot-password}
      VITE_STRAPI_USERS_ENDPOINT: ${VITE_STRAPI_USERS_ENDPOINT:-/api/users}
      VITE_STRAPI_ACTIVITIES_ENDPOINT: ${VITE_STRAPI_ACTIVITIES_ENDPOINT:-/api/topics}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev:host
    restart: unless-stopped

volumes:
  frontend_node_modules:
